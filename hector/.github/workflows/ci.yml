name: HECTOR CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ---------- Lint & Type Check ----------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check hector/backend/ --output-format=github
      - name: Ruff format check
        run: ruff format --check hector/backend/
      - name: MyPy type check
        run: mypy hector/backend/api/ hector/backend/core/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ---------- Python Tests ----------
  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: hector/backend/requirements.txt
      - name: Install dependencies
        run: pip install -r hector/backend/requirements.txt
      - name: Run tests
        run: pytest hector/backend/tests/ -v --tb=short --timeout=60
        env:
          HECTOR_API_KEY: test-key
          HECTOR_JWT_SECRET: test-secret-for-ci-only-32-bytes-min

  # ---------- Frontend Build ----------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: hector/package-lock.json
      - name: Install
        working-directory: hector
        run: npm ci
      - name: Build
        working-directory: hector
        run: npm run build

  # ---------- Docker Build ----------
  docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: hector/backend
          push: false
          tags: hector-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Security Scan ----------
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install safety
        run: pip install safety
      - name: Check dependencies
        run: safety check -r hector/backend/requirements.txt
        continue-on-error: true

# HECTOR Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Requires:
#   - .env with all production secrets
#   - certs/ directory with fullchain.pem and privkey.pem (or use Let's Encrypt)

services:
  # ---------- Nginx reverse proxy with SSL ----------
  nginx:
    image: nginx:alpine
    container_name: hector-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---------- Backend API ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hector-api-prod
    env_file: .env
    environment:
      - HECTOR_DB_PATH=/app/hector_db
      - HECTOR_BOOKS_DIR=/app/data/Books
      - HECTOR_CORS_ORIGINS=https://your-domain.com
      - HECTOR_LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://hector:${POSTGRES_PASSWORD}@postgres:5432/hector
    volumes:
      - hector_db:/app/hector_db
      - hector_books:/app/data/Books
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------- Frontend ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hector-frontend-prod
    environment:
      - VITE_API_URL=https://your-domain.com
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---------- Redis (caching + rate limiting) ----------
  redis:
    image: redis:7-alpine
    container_name: hector-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------- PostgreSQL (user management) ----------
  postgres:
    image: postgres:16-alpine
    container_name: hector-postgres
    environment:
      POSTGRES_DB: hector
      POSTGRES_USER: hector
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hector"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  hector_db:
  hector_books:
  redis_data:
  postgres_data:

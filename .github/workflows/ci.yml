name: HECTOR CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # ---------- Lint & Type Check ----------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .
      - name: MyPy type check
        run: mypy api/ core/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ---------- Python Tests ----------
  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=60
        env:
          HECTOR_API_KEY: test-key
          HECTOR_JWT_SECRET: test-secret-for-ci-only-32-bytes-min

  # ---------- Frontend Build ----------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Rebuild native modules
        working-directory: frontend
        run: npm rebuild
      - name: Install platform-specific Tailwind bindings
        working-directory: frontend
        run: npm install @tailwindcss/oxide-linux-x64-gnu --no-save
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

  # ---------- Docker Build ----------
  docker:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hector-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: hector-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Security Scan ----------
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install safety
        run: pip install safety
      - name: Check dependencies
        run: safety check -r requirements.txt
        continue-on-error: true
